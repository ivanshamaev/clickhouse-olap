name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  addin:
    name: Add-in — lint, test, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: addin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: addin/.nvmrc
          cache: npm
          cache-dependency-path: addin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage

      - name: Production build
        run: npm run build

      - name: Upload build artifact (for release job)
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: addin-dist
          path: addin/dist/
          retention-days: 1
