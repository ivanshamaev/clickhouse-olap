name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Rust engine ───────────────────────────────────────────────────────────────
  engine:
    name: Engine — fmt, clippy, test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: engine

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - run: cargo fmt --check
        name: Format check

      - run: cargo clippy -- -D warnings
        name: Clippy

      - run: cargo test
        name: Test

  # ── Office.js add-in ─────────────────────────────────────────────────────────
  addin:
    name: Add-in — lint, test, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: addin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: addin/.nvmrc
          cache: npm
          cache-dependency-path: addin/package-lock.json

      - run: npm ci
        name: Install dependencies

      - run: npm run lint
        name: Lint

      - run: npm test -- --coverage
        name: Test

      - run: npm run build
        name: Build

      - name: Merge site/ into dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ github.workspace }}
        run: cp -r site/. addin/dist/

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: addin/dist/

  # ── Deploy GitHub Pages (main only) ──────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: addin
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
