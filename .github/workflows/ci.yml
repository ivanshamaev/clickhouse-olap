name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  addin:
    name: Lint, test, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: addin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: addin/.nvmrc
          cache: npm
          cache-dependency-path: addin/package-lock.json

      - run: npm ci
        name: Install dependencies

      - run: npm run lint
        name: Lint

      - run: npm test -- --coverage
        name: Test

      - run: npm run build
        name: Build
