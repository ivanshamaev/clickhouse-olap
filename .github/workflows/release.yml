name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write   # gh release create
  pages: write      # deploy to GitHub Pages
  id-token: write   # required by actions/deploy-pages

jobs:
  # ── 1. Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build add-in
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: addin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: addin/.nvmrc
          cache: npm
          cache-dependency-path: addin/package-lock.json

      - run: npm ci
        name: Install dependencies

      - run: npm test
        name: Test

      - run: npm run build
        name: Build (production)

      - name: Patch manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" dist/manifest.xml

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: addin-dist
          path: addin/dist/
          retention-days: 1

  # ── 2. Publish to GitHub Pages ────────────────────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: addin-dist
          path: dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── 3. Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: addin-dist
          path: dist/

      - name: Create zip archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (cd dist && zip -r "../clickhouse-olap-addin-v${VERSION}.zip" .)

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Delete existing release for this tag if it exists (keep the tag itself)
          gh release delete "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --yes 2>/dev/null || true
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --generate-notes \
            "dist/manifest.xml#manifest.xml (установить в Excel)" \
            "clickhouse-olap-addin-v${VERSION}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
