name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: addin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: addin/.nvmrc
          cache: npm
          cache-dependency-path: addin/package-lock.json

      - run: npm ci
        name: Install dependencies

      - run: npm test
        name: Test

      - run: npm run build
        name: Build (production)

      - name: Patch manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" dist/manifest.xml

      - name: Create zip archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (cd dist && zip -r "../clickhouse-olap-addin-v${VERSION}.zip" .)

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release delete "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --yes 2>/dev/null || true
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Release ${GITHUB_REF_NAME}" \
            --generate-notes \
            "dist/manifest.xml#manifest.xml (установить в Excel)" \
            "clickhouse-olap-addin-v${VERSION}.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
