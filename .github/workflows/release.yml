name: Release

# Triggered by pushing a version tag, e.g.: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── 1. Build add-in ────────────────────────────────────────────────────────
  build-addin:
    name: Build add-in
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.version.outputs.value }}

    defaults:
      run:
        working-directory: addin

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: addin/.nvmrc
          cache: npm
          cache-dependency-path: addin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (gate before release)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Patch manifest version
        # Keeps the manifest Version field in sync with the git tag
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" dist/manifest.xml

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: addin-dist
          path: addin/dist/
          retention-days: 1

  # ── 2. Create GitHub Release ──────────────────────────────────────────────
  # Independent of deploy-pages: release is always created on a valid tag.
  release:
    name: Create GitHub Release
    needs: build-addin
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create release + upload assets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for changelog generation

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: addin-dist
          path: dist/

      - name: Package add-in zip
        run: |
          VERSION="${{ needs.build-addin.outputs.version }}"
          cd dist
          zip -r "../clickhouse-olap-addin-v${VERSION}.zip" .

      - name: Generate changelog from conventional commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p' || true)
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges | head -30)
          else
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## ClickHouse OLAP Add-in ${{ github.ref_name }}

            ### Install

            1. Download `clickhouse-olap-addin-${{ github.ref_name }}.zip` below.
            2. Extract the archive and host its contents on any HTTPS server.
            3. In Excel → **Insert → Add-ins → Upload My Add-in** → select `manifest.xml`.
            4. In the add-in sidebar, set the engine endpoint to your Rust engine URL.

            > **Tip:** Add `?mock=1` to the taskpane URL in the manifest to run a standalone demo without a live engine.

            ### Changes

            ```
            ${{ steps.changelog.outputs.log }}
            ```
          files: |
            clickhouse-olap-addin-v${{ needs.build-addin.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── 3. Deploy to GitHub Pages (optional) ─────────────────────────────────
  # Requires GitHub Pages to be enabled in repo Settings → Pages → Source: GitHub Actions.
  # Skipped silently if Pages is not configured; does NOT block the release above.
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-addin
    runs-on: ubuntu-latest
    continue-on-error: true   # Pages unavailable on private repos / free plan — don't block release
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: addin-dist
          path: dist/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
